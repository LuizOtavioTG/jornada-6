spring:
  application:
    name: jornada-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jornada}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:jornada}
    password: ${DATABASE_PASSWORD:jornada}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
  error:
    include-message: always
security:
  jwt:
    secret: change-me-please
    expiration: 3600
    refresh-expiration: 604800
