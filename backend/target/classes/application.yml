spring:
  application:
    name: jornada-backend
  datasource:
    url: jdbc:h2:mem:jornada;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
server:
  port: 8080
  error:
    include-message: always
security:
  jwt:
    secret: change-me-please
    expiration: 3600
    refresh-expiration: 604800
