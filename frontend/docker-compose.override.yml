# Arquivo para desenvolvimento local
version: '3.8'

services:
  app:
    build:
      target: deps
    command: >-
      sh -c "corepack enable pnpm && [ -d node_modules ] || pnpm install --frozen-lockfile
      && pnpm run dev"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
      - "3001:3001" # Para hot reload

  postgres:
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=os_management_dev
